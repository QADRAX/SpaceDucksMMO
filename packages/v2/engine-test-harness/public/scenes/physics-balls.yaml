# Physics test: floor with concrete, gold balls falling, walls, camera on waypoint path.
entities:
  # --- Gravity (Y-down, standard Earth) ---
  - id: gravity
    components:
      gravity: { x: 0, y: -9.81, z: 0 }

  # --- Arena container (floor + walls as children, wobble keeps balls moving) ---
  - id: arena
    transform:
      position: { x: 0, y: 0, z: 0 }
    components:
      script:
        scripts:
          - scriptId: scripts/wobble
            enabled: true
            properties:
              axis: both
              maxAngle: 4
              changeInterval: 5
              smoothSpeed: 1.2
    children:
      - id: floor
        transform:
          position: { x: 0, y: -0.25, z: 0 }
        components:
          boxGeometry: { width: 12, height: 0.5, depth: 12, castShadow: true, receiveShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 6, y: 0.25, z: 6 }, restitution: 0.6 }

      - id: wall-north
        transform:
          position: { x: 0, y: 1.5, z: 6 }
        components:
          boxGeometry: { width: 12, height: 3, depth: 0.5, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 6, y: 1.5, z: 0.25 } }

      - id: wall-south
        transform:
          position: { x: 0, y: 1.5, z: -6 }
        components:
          boxGeometry: { width: 12, height: 3, depth: 0.5, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 6, y: 1.5, z: 0.25 }, restitution: 0.6 }

      - id: wall-east
        transform:
          position: { x: 6, y: 1.5, z: 0 }
        components:
          boxGeometry: { width: 0.5, height: 3, depth: 12, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 0.25, y: 1.5, z: 6 }, restitution: 0.6 }

      - id: wall-west
        transform:
          position: { x: -6, y: 1.5, z: 0 }
        components:
          boxGeometry: { width: 0.5, height: 3, depth: 12, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 0.25, y: 1.5, z: 6 }, restitution: 0.6 }

  # --- Center target (empty entity for camera to look at) ---
  - id: center-target
    transform:
      position: { x: 0, y: 1, z: 0 }

  # --- Balls (gold, dynamic, high restitution, spread to collide) ---
  - id: ball-1
    transform:
      position: { x: -2.5, y: 18, z: -2 }
    components:
      sphereGeometry: { radius: 0.3, castShadow: true }
      standardMaterial: textures/MetalGoldFoil001
      rigidBody: { bodyType: dynamic }
      sphereCollider: { radius: 0.3, restitution: 0.85 }

  - id: ball-2
