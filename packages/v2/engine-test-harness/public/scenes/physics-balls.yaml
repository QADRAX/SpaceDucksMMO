  # --- Waypoints (empty, for camera path around arena, above walls) ---
  - id: wp-1
    transform:
      position: { x: -5, y: 4, z: -5 }
  - id: wp-2
    transform:
      position: { x: 5, y: 4, z: -5 }
  - id: wp-3
    transform:
      position: { x: 5, y: 4, z: 5 }
  - id: wp-4
    transform:
      position: { x: -5, y: 4, z: 5 }

  # --- Camera (slower waypoint path + look at center) ---
  - id: main-camera
    transform:
      position: { x: -5, y: 4, z: -5 }
    components:
      cameraView: { fov: 60 }
      script:
        scripts:
          - scriptId: builtin://waypoint_path.lua
            enabled: true
            properties:
              waypoints: [wp-1, wp-2, wp-3, wp-4]
              speed: 1.5
              loop: true
              arrivalThreshold: 0.2
          - scriptId: builtin://move_to_point.lua
            enabled: true
            properties:
              duration: 3
              easing: "linear"
          - scriptId: builtin://look_at_entity.lua
            enabled: true
            properties:
              targetEntityId: center-target

  # --- Sun ---
  - id: sun
    transform:
      position: { x: 5, y: 12, z: 5 }
    components:
      directionalLight:
        intensity: 1
        shadowBias: 0
        shadowNormalBias: 0.01
