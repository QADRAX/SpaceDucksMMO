entities:
  - id: main-camera
    transform:
      position: { x: 0, y: 6, z: 8 }
    components:
      cameraView: { fov: 60 }
  - id: ambient
    components:
      ambientLight: { intensity: 0.5 }
  - id: sun
    transform:
      position: { x: 5, y: 10, z: 5 }
    components:
      directionalLight: { intensity: 1 }
  - id: floor
    components:
      boxGeometry: { width: 10, height: 0.5, depth: 10 }
      standardMaterial: textures/concrete-muddy
