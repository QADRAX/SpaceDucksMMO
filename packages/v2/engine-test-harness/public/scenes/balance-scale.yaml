# Balancín rectangular: arena que se inclina + 30 bolas que caen en un extremo + péndulos en el centro.
# Las bolas ruedan de un lado al otro colisionando con los péndulos.
entities:
  - id: gravity
    components:
      gravity: { x: 0, y: -9.81, z: 0 }

  # --- Arena balancín (se inclina, bolas ruedan de lado a lado) ---
  - id: arena
    transform:
      position: { x: 0, y: 0, z: 0 }
    components:
      script:
        scripts:
          - scriptId: scripts/wobble
            enabled: true
            properties:
              axis: both
              maxAngle: 10
              changeInterval: 3
              smoothSpeed: 1.5
    children:
      - id: floor
        transform:
          position: { x: 0, y: -0.25, z: 0 }
        components:
          boxGeometry: { width: 16, height: 0.5, depth: 16, castShadow: true, receiveShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 8, y: 0.25, z: 8 }, restitution: 0.5 }

      - id: wall-north
        transform:
          position: { x: 0, y: 1.5, z: 8 }
        components:
          boxGeometry: { width: 16, height: 3, depth: 0.5, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 8, y: 1.5, z: 0.25 } }

      - id: wall-south
        transform:
          position: { x: 0, y: 1.5, z: -8 }
        components:
          boxGeometry: { width: 16, height: 3, depth: 0.5, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 8, y: 1.5, z: 0.25 } }

      - id: wall-east
        transform:
          position: { x: 8, y: 1.5, z: 0 }
        components:
          boxGeometry: { width: 0.5, height: 3, depth: 16, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 0.25, y: 1.5, z: 8 } }

      - id: wall-west
        transform:
          position: { x: -8, y: 1.5, z: 0 }
        components:
          boxGeometry: { width: 0.5, height: 3, depth: 16, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 0.25, y: 1.5, z: 8 } }

      # --- Péndulos dentro del balancín: las bolas chocan y los hacen oscilar ---
      - id: pendulum-1
        transform:
          position: { x: -4, y: 2.8, z: 0 }
        components:
          boxGeometry: { width: 0.35, height: 0.35, depth: 0.35, castShadow: true }
          standardMaterial: textures/concrete-muddy
          rigidBody: { bodyType: static }
          boxCollider: { halfExtents: { x: 0.17, y: 0.17, z: 0.17 } }
        children:
          - id: cylinder-1
            transform:
              position: { x: 0, y: -1.6, z: 0 }
            components:
              cylinderGeometry: { radiusTop: 0.15, radiusBottom: 0.15, height: 1.2, castShadow: true }
              standardMaterial: textures/MetalGoldFoil001
              rigidBody: { bodyType: dynamic, jointToParent: revolute, mass: 0.8, angularDamping: 0.5 }
              cylinderCollider: { radius: 0.15, halfHeight: 0.6, restitution: 0.4 }

      - id: pendulum-2
