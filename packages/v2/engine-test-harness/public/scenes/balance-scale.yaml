  # --- Camera target (empty entity for camera to look at) ---
  - id: camera-target
    transform:
      position: { x: 0, y: 1.5, z: 0 }

  # --- Waypoints (empty, for camera path around arena, above walls) ---
  - id: wp-1
    transform:
      position: { x: -7, y: 5, z: -7 }
  - id: wp-2
    transform:
      position: { x: 7, y: 5, z: -7 }
  - id: wp-3
    transform:
      position: { x: 7, y: 5, z: 7 }
  - id: wp-4
    transform:
      position: { x: -7, y: 5, z: 7 }

  # --- Camera (waypoint path + look at center) ---
  - id: main-camera
    transform:
      position: { x: -7, y: 5, z: -7 }
    components:
      cameraPerspective: { fov: 50 }
      script:
        scripts:
          - scriptId: builtin://waypoint_path.lua
            enabled: true
            properties:
              waypoints: [wp-1, wp-2, wp-3, wp-4]
              speed: 1.5
              loop: true
              arrivalThreshold: 0.2
          - scriptId: builtin://move_to_point.lua
            enabled: true
            properties:
              duration: 3
              easing: "linear"
          - scriptId: builtin://look_at_entity.lua
            enabled: true
            properties:
              targetEntityId: camera-target

