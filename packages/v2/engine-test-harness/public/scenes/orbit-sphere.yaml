# Camera orbits around sphere using built-in orbit_camera + look_at_entity scripts.
entities:
  - id: sphere
    transform:
      position: { x: 0, y: 0, z: 0 }
    components:
      sphereGeometry: { radius: 1 }
      standardMaterial: textures/MetalGoldFoil001
  - id: main-camera
    transform:
      position: { x: 0, y: 0, z: 8 }
    components:
      cameraView: { fov: 60 }
      script:
        scripts:
          - scriptId: builtin://orbit_camera.lua
            enabled: true
            properties:
              targetEntityId: sphere
              altitudeFromSurface: 7
              speed: 0.5
              orbitPlane: xz
          - scriptId: builtin://look_at_entity.lua
            enabled: true
            properties:
              targetEntityId: sphere
  - id: sun
    transform:
      position: { x: 5, y: 10, z: 5 }
    components:
      directionalLight: { intensity: 1 }
